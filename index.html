<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internet Dice Remote</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg-green: #2e8b57; --panel-purple: #7b2cbf; --dot-black: #1a1a1a; --accent-red: #ff4d4d; }
        body { margin: 0; background: #333; display: flex; justify-content: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .container { width: 360px; height: 640px; display: flex; flex-direction: column; background: var(--bg-green); position: relative; }
        
        /* Fixed Header */
        .conn-header { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; z-index: 100; }
        .conn-controls { display: flex; gap: 5px; margin-top: 5px; }
        input { background: #222; border: 1px solid #444; color: white; flex: 1; padding: 5px; border-radius: 4px; }
        button.conn-btn { background: #444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }

        .dice-display { flex: 1; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 20px; align-items: center; justify-items: center; }
        .controls-bar { background: rgba(0,0,0,0.3); color: white; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; font-weight: bold; }
        .reset-btn { background: var(--accent-red); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        .input-panel { background: var(--panel-purple); padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .num-btn { background: white; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 32px; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        
        .dice { width: 80px; height: 80px; background: white; border-radius: 12px; display: grid; grid-template-areas: "a . b" "c d e" "f . g"; padding: 10px; box-sizing: border-box; box-shadow: 2px 4px 8px rgba(0,0,0,0.3); }
        .dot { width: 14px; height: 14px; background: var(--dot-black); border-radius: 50%; }
        .dice[data-val="1"] .dot { grid-area: d; }
        .dice[data-val="2"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="2"] .dot:nth-child(2) { grid-area: g; }
        .dice[data-val="3"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="3"] .dot:nth-child(2) { grid-area: d; } .dice[data-val="3"] .dot:nth-child(3) { grid-area: g; }
        .dice[data-val="4"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="4"] .dot:nth-child(2) { grid-area: b; } .dice[data-val="4"] .dot:nth-child(3) { grid-area: f; } .dice[data-val="4"] .dot:nth-child(4) { grid-area: g; }
        .dice[data-val="5"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="5"] .dot:nth-child(2) { grid-area: b; } .dice[data-val="5"] .dot:nth-child(3) { grid-area: d; } .dice[data-val="5"] .dot:nth-child(4) { grid-area: f; } .dice[data-val="5"] .dot:nth-child(5) { grid-area: g; }
        .dice[data-val="6"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="6"] .dot:nth-child(2) { grid-area: b; } .dice[data-val="6"] .dot:nth-child(3) { grid-area: c; } .dice[data-val="6"] .dot:nth-child(4) { grid-area: e; } .dice[data-val="6"] .dot:nth-child(5) { grid-area: f; } .dice[data-val="6"] .dot:nth-child(6) { grid-area: g; }
    </style>
</head>
<body>

<div class="container">
    <div class="conn-header" id="header">
        <div>MY ID: <span id="my-id" style="color:white">...</span></div>
        <div class="conn-controls">
            <input type="text" id="target-id" placeholder="Enter PC ID">
            <button class="conn-btn" onclick="connectToPeer()">CONNECT</button>
        </div>
        <div id="status-log" style="font-size: 10px; margin-top:5px; color:#aaa;">Waiting...</div>
    </div>

    <div class="dice-display" id="diceContainer"></div>

    <div class="controls-bar">
        <span id="status-text">0 Dice</span>
        <button class="reset-btn" onclick="sendAction('reset')">RESET</button>
    </div>

    <div class="input-panel">
        <div class="num-btn" onclick="sendAction('add', 1)">1</div>
        <div class="num-btn" onclick="sendAction('add', 2)">2</div>
        <div class="num-btn" onclick="sendAction('add', 3)">3</div>
        <div class="num-btn" onclick="sendAction('add', 4)">4</div>
        <div class="num-btn" onclick="sendAction('add', 5)">5</div>
        <div class="num-btn" onclick="sendAction('add', 6)">6</div>
    </div>
</div>

<script>
    let diceList = [];
    const peer = new Peer();
    let conn;
    const log = document.getElementById('status-log');

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        log.innerText = "Online. Ready for connection.";
    });

    // This handles the PC side receiving a connection
    peer.on('connection', c => {
        conn = c;
        setupListeners();
        log.innerText = "CONNECTED (Target Mode)";
        document.getElementById('header').style.background = "#004400";
    });

    function connectToPeer() {
        const id = document.getElementById('target-id').value.trim();
        if(!id) return;
        log.innerText = "Connecting to " + id + "...";
        conn = peer.connect(id);
        setupListeners();
    }

    function setupListeners() {
        conn.on('open', () => {
            log.innerText = "CONNECTED (Remote Mode)";
            document.getElementById('header').style.background = "#004400";
        });
        conn.on('data', data => handleSync(data));
        conn.on('error', err => { log.innerText = "Error: " + err; });
    }

    function sendAction(type, data) {
        const payload = { type, data };
        if (conn && conn.open) {
            conn.send(payload);
        }
        handleSync(payload); // Update local screen too
    }

    function handleSync(payload) {
        if (payload.type === 'add' && diceList.length < 6) diceList.push(payload.data);
        if (payload.type === 'remove') diceList.splice(payload.data, 1);
        if (payload.type === 'reset') diceList = [];
        updateUI();
    }

    function updateUI() {
        const container = document.getElementById('diceContainer');
        container.innerHTML = '';
        diceList.forEach((val, idx) => {
            const d = document.createElement('div');
            d.className = 'dice';
            d.setAttribute('data-val', val);
            d.onclick = () => sendAction('remove', idx);
            for(let i=0; i<val; i++) d.appendChild(document.createElement('div')).className = 'dot';
            container.appendChild(d);
        });
        document.getElementById('status-text').innerText = diceList.length + " Dice";
    }
</script>
</body>
</html>

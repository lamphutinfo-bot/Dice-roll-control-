<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Remote Dice - Fixed</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-green: #2e8b57;
            --panel-purple: #7b2cbf;
            --dot-black: #1a1a1a;
            --accent-red: #ff4d4d;
        }

        body { margin: 0; background: #333; display: flex; justify-content: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .container {
            width: 360px; height: 640px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: var(--bg-green);
            position: relative;
        }

        /* Connection Header */
        .conn-header {
            background: #000; color: #0f0; font-family: monospace;
            padding: 8px; font-size: 11px; display: flex; flex-direction: column; gap: 5px;
        }
        .conn-controls { display: flex; gap: 5px; }
        .conn-controls input { background: #222; border: 1px solid #444; color: white; flex: 1; padding: 2px 5px; }
        .conn-controls button { background: #444; color: white; border: none; padding: 2px 10px; cursor: pointer; }

        .dice-display {
            flex: 1; padding: 20px;
            display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            gap: 20px; align-items: center; justify-items: center;
        }

        .controls-bar {
            background-color: rgba(0,0,0,0.2);
            color: white; display: flex;
            justify-content: space-between; align-items: center;
            padding: 10px 20px; font-weight: bold;
        }

        .reset-btn {
            background: var(--accent-red); color: white;
            border: none; padding: 6px 14px; border-radius: 4px;
            cursor: pointer; font-size: 12px; font-weight: bold;
        }

        .input-panel {
            background-color: var(--panel-purple);
            padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }

        .num-btn {
            background: white; aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .dice {
            width: 85px; height: 85px; background: white; border-radius: 12px;
            display: grid; grid-template-areas: "a . b" "c d e" "f . g";
            padding: 10px; box-sizing: border-box;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .dot { width: 14px; height: 14px; background: var(--dot-black); border-radius: 50%; }
        
        /* Grid Dot Placement */
        .dice[data-val="1"] .dot { grid-area: d; }
        .dice[data-val="2"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="2"] .dot:nth-child(2) { grid-area: g; }
        .dice[data-val="3"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="3"] .dot:nth-child(2) { grid-area: d; } .dice[data-val="3"] .dot:nth-child(3) { grid-area: g; }
        .dice[data-val="4"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="4"] .dot:nth-child(2) { grid-area: b; } .dice[data-val="4"] .dot:nth-child(3) { grid-area: f; } .dice[data-val="4"] .dot:nth-child(4) { grid-area: g; }
        .dice[data-val="5"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="5"] .dot:nth-child(2) { grid-area: b; } .dice[data-val="5"] .dot:nth-child(3) { grid-area: d; } .dice[data-val="5"] .dot:nth-child(4) { grid-area: f; } .dice[data-val="5"] .dot:nth-child(5) { grid-area: g; }
        .dice[data-val="6"] .dot:nth-child(1) { grid-area: a; } .dice[data-val="6"] .dot:nth-child(2) { grid-area: b; } .dice[data-val="6"] .dot:nth-child(3) { grid-area: c; } .dice[data-val="6"] .dot:nth-child(4) { grid-area: e; } .dice[data-val="6"] .dot:nth-child(5) { grid-area: f; } .dice[data-val="6"] .dot:nth-child(6) { grid-area: g; }
    </style>
</head>
<body>

<div class="container">
    <div class="conn-header">
        <div>MY ID: <span id="my-id" style="color:white">...</span></div>
        <div class="conn-controls">
            <input type="text" id="target-id" placeholder="Remote ID">
            <button onclick="connectToPeer()">CONNECT</button>
        </div>
    </div>

    <div class="dice-display" id="diceContainer"></div>

    <div class="controls-bar">
        <span id="status">0 Selected</span>
        <button class="reset-btn" onclick="sendAction('reset')">RESET</button>
    </div>

    <div class="input-panel">
        <div class="num-btn" onclick="sendAction('add', 1)">1</div>
        <div class="num-btn" onclick="sendAction('add', 2)">2</div>
        <div class="num-btn" onclick="sendAction('add', 3)">3</div>
        <div class="num-btn" onclick="sendAction('add', 4)">4</div>
        <div class="num-btn" onclick="sendAction('add', 5)">5</div>
        <div class="num-btn" onclick="sendAction('add', 6)">6</div>
    </div>
</div>

<script>
    let diceList = [];
    let peer = new Peer();
    let conn;
    const container = document.getElementById('diceContainer');
    const statusText = document.getElementById('status');

    // PeerJS Connection Setup
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); });

    function connectToPeer() {
        const id = document.getElementById('target-id').value;
        conn = peer.connect(id);
        setupConn();
    }

    function setupConn() {
        conn.on('data', data => handleSync(data));
        document.querySelector('.conn-header').style.background = '#004400';
    }

    // New "Send" logic that updates locally AND remotely
    function sendAction(type, valOrIndex) {
        const payload = { type, data: valOrIndex };
        if (conn) conn.send(payload);
        handleSync(payload); // Update self
        if (navigator.vibrate) navigator.vibrate(20);
    }

    function handleSync(payload) {
        if (payload.type === 'add') {
            if (diceList.length < 6) diceList.push(payload.data);
        } 
        else if (payload.type === 'remove') {
            diceList.splice(payload.data, 1);
        } 
        else if (payload.type === 'reset') {
            diceList = [];
        }
        updateUI();
    }

    function updateUI() {
        container.innerHTML = '';
        diceList.forEach((val, index) => {
            const d = document.createElement('div');
            d.className = 'dice';
            d.setAttribute('data-val', val);
            d.onclick = () => sendAction('remove', index);
            
            for(let i=0; i<val; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                d.appendChild(dot);
            }
            container.appendChild(d);
        });
        statusText.innerText = `${diceList.length} Selected`;
    }
</script>
</body>
</html>
